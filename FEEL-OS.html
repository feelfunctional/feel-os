<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>feel. os</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --cream:#F6F5F0; --cream2:#EDDDC6;
  --olive:#84763D; --black:#000; --border:#00000022; --border2:#00000033;
  --neuro:#FF6300; --serenity:#84763D; --hormone:#B75025; --yellow:#E9E15B;
  --ink:#1a1a1a; --muted:#6b6b63; --muted2:#9a9a90;
  --card:#ffffff; --bg2:#efeee8; --good:#3B6D11; --warn:#854F0B; --bad:#B42318;
  --r:16px; --r2:12px; --shadow:0 1px 2px rgba(0,0,0,.04);
  --font:'Helvetica Neue',Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--font);background:var(--cream);color:var(--ink);font-weight:500;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5}
a{color:inherit}
button{font-family:var(--font);cursor:pointer;border:none;background:none}
input,select,textarea{font-family:var(--font);font-size:16px}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#0000001f;border-radius:10px}

/* layout */
#app{display:flex;min-height:100vh}
#side{width:248px;flex:0 0 248px;background:#fff;border-right:1px solid var(--border);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:18px 14px;gap:4px;overflow-y:auto}
.brandmark{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
.brandmark .logo{font-size:30px;font-weight:700;letter-spacing:-.04em;line-height:1}
.brandmark .dot{width:9px;height:9px;border-radius:50%;background:var(--neuro);margin-bottom:4px}
.brandmark small{display:block;color:var(--muted);font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.navgroup{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted2);padding:14px 10px 6px;font-weight:600}
.nav{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:12px;color:var(--ink);font-size:14.5px;font-weight:600;text-decoration:none;transition:.12s}
.nav .ic{font-size:17px;width:20px;text-align:center}
.nav:hover{background:var(--bg2)}
.nav.active{background:var(--black);color:#fff}
.nav .badge{margin-left:auto;background:var(--neuro);color:#fff;font-size:11px;font-weight:700;border-radius:20px;padding:1px 7px;min-width:20px;text-align:center}
.nav.active .badge{background:#fff;color:#000}
.side-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px}
.syncpill{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);padding:6px 10px;font-weight:600}
.syncpill .led{width:8px;height:8px;border-radius:50%;background:var(--muted2)}
.syncpill.on .led{background:var(--good)}
.syncpill.off .led{background:var(--warn)}

#main{flex:1;min-width:0;display:flex;flex-direction:column}
#top{position:sticky;top:0;z-index:30;background:rgba(246,245,240,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:12px 22px}
#burger{display:none;font-size:22px;width:40px;height:40px;border-radius:10px}
#search{flex:1;max-width:420px;display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px 14px}
#search input{border:none;outline:none;width:100%;background:none;font-weight:500}
#search .k{font-size:11px;color:var(--muted2);border:1px solid var(--border);border-radius:6px;padding:1px 6px;font-weight:600}
.top-actions{margin-left:auto;display:flex;gap:8px}
#view{padding:26px 28px 80px;max-width:1180px;width:100%}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.page-head h1{font-size:30px;font-weight:700;letter-spacing:-.03em}
.page-head p{color:var(--muted);font-size:14px;margin-top:3px;max-width:560px}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--black);color:#fff;border-radius:12px;padding:12px 18px;font-size:14.5px;font-weight:600;transition:.12s;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--border2)}
.btn.olive{background:var(--olive)}
.btn.sm{padding:8px 13px;font-size:13px;border-radius:10px}
.btn.block{width:100%;justify-content:center}
.iconbtn{width:40px;height:40px;border-radius:11px;background:#fff;border:1px solid var(--border2);display:inline-flex;align-items:center;justify-content:center;font-size:17px}
.iconbtn:hover{background:var(--bg2)}

/* cards & grid */
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.card h3{font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:12px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.stat .lbl{font-size:12.5px;color:var(--muted);font-weight:600}
.stat .val{font-size:30px;font-weight:700;letter-spacing:-.03em;margin-top:6px}
.stat .sub{font-size:12px;color:var(--muted2);margin-top:3px;font-weight:500}
.stat.accent{color:#fff}
.pillrow{display:flex;gap:8px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;border-radius:30px;padding:4px 11px;background:var(--bg2);color:var(--ink)}
.chip.b{background:#E6F1FB;color:#185FA5}.chip.g{background:#EAF3DE;color:#3B6D11}.chip.a{background:#FAEEDA;color:#854F0B}.chip.r{background:#FBE6E4;color:#B42318}.chip.p{background:#EEEDFE;color:#534AB7}.chip.n{background:#eee;color:#555}

/* tables */
.tablewrap{background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:12px 14px;border-bottom:1px solid var(--border);background:#fcfcfa}
td{padding:13px 14px;border-bottom:1px solid var(--border);font-weight:500}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:.1s}
tbody tr:hover{background:var(--bg2)}
.rowmuted{color:var(--muted)}

/* board / kanban */
.board{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px}
.bcol{flex:0 0 250px;background:var(--bg2);border-radius:14px;padding:10px}
.bcol h4{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;padding:6px 8px;display:flex;justify-content:space-between}
.bcard{background:#fff;border:1px solid var(--border);border-radius:11px;padding:11px 12px;margin-top:8px;cursor:pointer;box-shadow:var(--shadow)}
.bcard:hover{border-color:var(--black)}
.bcard .t{font-weight:600;font-size:14px}
.bcard .m{font-size:12px;color:var(--muted);margin-top:4px;display:flex;gap:6px;flex-wrap:wrap}

/* toolbar */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.toolbar .filter{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border2);border-radius:11px;padding:9px 13px}
.toolbar .filter input{border:none;outline:none;width:100%;background:none}
.seg{display:inline-flex;background:#fff;border:1px solid var(--border2);border-radius:11px;overflow:hidden}
.seg button{padding:9px 15px;font-size:13px;font-weight:600;color:var(--muted)}
.seg button.active{background:var(--black);color:#fff}
select.mini{border:1px solid var(--border2);border-radius:11px;padding:9px 12px;background:#fff;font-weight:600;font-size:13px}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(20,18,12,.42);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal{background:#fff;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:22px 22px 30px;animation:up .22s ease}
@media(min-width:760px){.overlay{align-items:center;padding:24px}.modal{border-radius:20px}}
@keyframes up{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}
.modal h2{font-size:21px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.modal .sub{color:var(--muted);font-size:13px;margin-bottom:16px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--border2);border-radius:11px;padding:12px 13px;outline:none;background:#fff;font-weight:500}
.field textarea{min-height:88px;resize:vertical;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--black)}
.field.half{display:inline-block;width:calc(50% - 5px)}
.field.half:nth-child(odd){margin-right:8px}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.modal-actions .btn{flex:1;justify-content:center}
.del{color:var(--bad);font-weight:600;font-size:13px;background:none;padding:10px}

/* brand hub */
.subtabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:14px;margin-bottom:6px;border-bottom:1px solid var(--border)}
.subtabs button{padding:9px 14px;border-radius:30px;font-size:13.5px;font-weight:600;color:var(--muted);white-space:nowrap;border:1px solid transparent}
.subtabs button.active{background:var(--black);color:#fff}
.prose{max-width:760px;line-height:1.65}
.prose h2{font-size:24px;font-weight:700;letter-spacing:-.02em;margin:26px 0 10px}
.prose h3{font-size:17px;font-weight:700;margin:22px 0 8px}
.prose p{margin:9px 0;color:#2a2a26}
.prose ul{margin:9px 0 9px 4px;list-style:none}
.prose li{padding:5px 0 5px 20px;position:relative}
.prose li:before{content:"";position:absolute;left:2px;top:13px;width:6px;height:6px;border-radius:50%;background:var(--olive)}
.swatch{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:12px;background:#fff}
.swatch .sw{width:42px;height:42px;border-radius:9px;border:1px solid var(--border2)}
.swatch .hex{font-family:ui-monospace,monospace;font-size:12px;color:var(--muted)}
.rulebox{border-left:3px solid var(--olive);background:#fff;border:1px solid var(--border);border-left-width:3px;border-radius:10px;padding:12px 16px;margin:8px 0}
.do{border-left-color:var(--good)} .dont{border-left-color:var(--bad)}
.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty .big{font-size:40px;margin-bottom:8px}
.checkitem{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border)}
.checkitem .x{color:var(--good);font-weight:800;font-size:16px}
.searchres{position:absolute;top:62px;left:0;right:0;background:#fff;border:1px solid var(--border2);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.14);max-height:60vh;overflow-y:auto;z-index:50}
.sr-item{display:flex;gap:10px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.sr-item:hover{background:var(--bg2)}
.note-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:15px 16px;box-shadow:var(--shadow)}
.note-card .meta{font-size:11.5px;color:var(--muted2);margin-top:9px;display:flex;justify-content:space-between;align-items:center}
.bar{height:8px;border-radius:6px;background:var(--bg2);overflow:hidden}
.bar > i{display:block;height:100%;border-radius:6px}

@media(max-width:900px){
  #side{position:fixed;left:0;top:0;z-index:60;transform:translateX(-100%);transition:.25s;box-shadow:0 0 50px rgba(0,0,0,.2)}
  #side.open{transform:none}
  #burger{display:inline-flex;align-items:center;justify-content:center}
  #view{padding:18px 16px 90px}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .page-head h1{font-size:25px}
  #search .k{display:none}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:55}
}
@media(min-width:901px){.scrim{display:none}}
</style>
</head>
<body>
<div id="app">
  <aside id="side"></aside>
  <div id="main">
    <header id="top">
      <button id="burger" class="iconbtn">☰</button>
      <div id="search">
        <span>⌕</span>
        <input id="searchInput" placeholder="Search everything…" autocomplete="off">
        <span class="k">⏎</span>
      </div>
      <div class="top-actions">
        <button class="iconbtn" data-action="quicknote" title="Quick note">✎</button>
        <button class="iconbtn" data-action="data-menu" title="Data & sync">⚙</button>
      </div>
    </header>
    <main id="view"></main>
  </div>
</div>
<div id="modalRoot"></div>

<script>
/* ============================================================
   FEEL OS  ·  single-file app  ·  Supabase + local cache
   ============================================================ */
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid=()=>'x'+Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);
const todayISO=()=>new Date().toISOString().slice(0,10);
const money=n=>'€'+(Number(n)||0).toLocaleString('es-ES',{maximumFractionDigits:0});
const daysTo=d=>d?Math.round((new Date(d)-new Date(todayISO()))/864e5):null;
const num=n=>Number(n)||0;
function splitCSVLine(l){const out=[];let cur='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){if(q&&l[i+1]==='"'){cur+='"';i++;}else q=!q;}else if(ch===','&&!q){out.push(cur);cur='';}else cur+=ch;}out.push(cur);return out;}
function mapHeader(h){h=h.toLowerCase();if(h.includes('email'))return 'email';if(h.includes('last'))return 'lastPurchase';if(h.includes('first purchase'))return 'firstPurchase';if(h.includes('first')||h.includes('name'))return 'firstName';if(h.includes('source'))return 'source';if(h.includes('spend')||h.includes('total'))return 'totalSpend';if(h.includes('purchase'))return 'firstPurchase';if(h.includes('tag'))return 'tags';if(h.includes('affin')||h.includes('product'))return 'affinity';return null;}
function parseCSV(txt){const lines=txt.split(/\r?\n/).filter(l=>l.trim());if(!lines.length)return [];
 const keys=splitCSVLine(lines[0]).map(h=>mapHeader(h.trim()));
 return lines.slice(1).map(line=>{const cells=splitCSVLine(line);const o={};keys.forEach((k,i)=>{if(k&&cells[i]!=null&&cells[i].trim()!=='')o[k]=cells[i].trim();});if(!o.source)o.source='manual';return o;}).filter(o=>o.email);}

/* ---------- product / static reference data ---------- */
const PRODUCTS={
  'Neuro Focus':{accent:'#FF6300',caf:'Full caffeine',ing:"Lion's Mane 400mg, Cordyceps 500mg, L-Theanine 100mg",pos:'Mental clarity · deep focus · energy',tag:'feel focused, think clear'},
  'Serenity Brew':{accent:'#84763D',caf:'60% decaf (Swiss Water)',ing:'Reishi 700mg, Ashwagandha 300mg, L-Theanine 100mg',pos:'Calm · balance · mindful pause',tag:'feel peace, sip by sip'},
  'Hormone Harmony':{accent:'#B75025',caf:'60% decaf (Swiss Water)',ing:'Chaga 500mg, Ashwagandha 300mg, Shatavari 200mg',pos:'Daily rhythm · vitality · feminine flow',tag:'feel balance, sip by sip'}
};
const ANGLE_CATS=['problem-aware','solution-aware','social proof','lifestyle','founder story','ingredient education','comparison','urgency'];

/* ---------- collections config ---------- */
const PRODNAMES=Object.keys(PRODUCTS);
const COLS={
 cafeterias:{label:'Cafeterías B2B',icon:'☕',primary:'title',board:'estado',
   stages:['pendiente','contactado','interesado','descartado'],
   cols:['title','phone','city','total_score','contactado','estado'],
   fields:[
     {k:'title',l:'Nombre',t:'text',req:1},{k:'phone',l:'Teléfono',t:'tel'},
     {k:'street',l:'Dirección',t:'text'},{k:'city',l:'Ciudad',t:'text'},
     {k:'total_score',l:'Rating',t:'number'},{k:'reviews_count',l:'Reviews',t:'number'},
     {k:'url',l:'Google Maps',t:'url'},{k:'website',l:'Website',t:'url'},
     {k:'contactado',l:'Contactado',t:'select',opts:['no','sí']},
     {k:'estado',l:'Estado',t:'select',opts:['pendiente','contactado','interesado','descartado']},
     {k:'fecha_contacto',l:'Fecha contacto',t:'date'},{k:'notas',l:'Notas',t:'textarea'}]},
 b2b:{label:'B2B CRM',icon:'🤝',primary:'name',board:'status',
   stages:['prospect','contacted','follow-up','sample sent','negotiating','active','lost'],
   cols:['name','type','status','location','nextAction'],
   fields:[
     {k:'name',l:'Business name',t:'text',req:1},{k:'contact',l:'Contact person',t:'text'},
     {k:'role',l:'Role',t:'text'},{k:'phone',l:'Phone',t:'tel'},{k:'email',l:'Email',t:'email'},
     {k:'location',l:'Location',t:'text'},{k:'mapUrl',l:'Map link',t:'url'},
     {k:'type',l:'Type',t:'select',opts:['cafe','restaurant','studio','gym','hotel','retailer','other']},
     {k:'status',l:'Status',t:'select',opts:['prospect','contacted','follow-up','sample sent','negotiating','active','lost']},
     {k:'lastContact',l:'Last contact',t:'date'},{k:'nextAction',l:'Next action',t:'date'},
     {k:'estVolume',l:'Est. monthly bags',t:'number'},{k:'notes',l:'Notes',t:'textarea'}]},
 influencers:{label:'Influencers',icon:'✨',primary:'handle',board:'status',
   stages:['outreach','responded','shipping','posted','repeat','declined'],
   cols:['handle','platform','followers','status','postUrl'],
   fields:[
     {k:'handle',l:'Handle',t:'text',req:1},{k:'platform',l:'Platform',t:'select',opts:['Instagram','TikTok','YouTube','Other']},
     {k:'followers',l:'Followers',t:'number'},{k:'niche',l:'Niche',t:'text'},{k:'email',l:'Email',t:'email'},
     {k:'country',l:'Country',t:'text'},{k:'language',l:'Language',t:'text'},
     {k:'status',l:'Status',t:'select',opts:['outreach','responded','shipping','posted','repeat','declined']},
     {k:'outreachDate',l:'Outreach date',t:'date'},{k:'responded',l:'Responded',t:'select',opts:['no','yes']},
     {k:'productSent',l:'Product sent',t:'select',opts:['no','yes']},{k:'tracking',l:'Tracking #',t:'text'},
     {k:'posted',l:'Posted',t:'select',opts:['no','yes']},{k:'postUrl',l:'Post URL',t:'url'},
     {k:'reach',l:'Reach',t:'number'},{k:'engagement',l:'Engagement',t:'text'},
     {k:'code',l:'Discount code',t:'text'},{k:'salesAttributed',l:'Sales attributed',t:'number'},
     {k:'notes',l:'Notes',t:'textarea'}]},
 ideas:{label:'Content',icon:'🎬',primary:'title',board:'status',
   stages:['idea','approved','scripted','filmed','edited','scheduled','posted'],
   cols:['title','pillar','format','status'],
   fields:[
     {k:'title',l:'Idea / title',t:'text',req:1},{k:'pillar',l:'Content pillar',t:'select',opts:()=>Store.list('pillars').map(p=>p.name)},
     {k:'format',l:'Format',t:'select',opts:['reel','carousel','story','static post','blog','email','ad']},
     {k:'status',l:'Status',t:'select',opts:['idea','approved','scripted','filmed','edited','scheduled','posted']},
     {k:'owner',l:'Owner',t:'select',opts:['Diana','Victor','Both']},{k:'notes',l:'Notes / hook',t:'textarea'}]},
 contacts:{label:'Email & Contacts',icon:'📧',primary:'email',
   cols:['email','firstName','source','totalSpend','lastPurchase'],
   fields:[
     {k:'email',l:'Email',t:'email',req:1},{k:'firstName',l:'First name',t:'text'},
     {k:'source',l:'Source',t:'select',opts:['Shopify customer','popup signup','event','form','manual']},
     {k:'firstPurchase',l:'First purchase',t:'date'},{k:'lastPurchase',l:'Last purchase',t:'date'},
     {k:'totalSpend',l:'Total spend (€)',t:'number'},
     {k:'affinity',l:'Product affinity',t:'select',opts:[...PRODNAMES,'bundle','unknown']},
     {k:'tags',l:'Tags',t:'text'},{k:'unsubscribed',l:'Unsubscribed',t:'select',opts:['no','yes']}]},
 adangles:{label:'Ad Angles',icon:'🎯',primary:'hook',board:'status',
   stages:['idea','in design','ready','live','retired'],
   cols:['hook','category','format','status'],
   fields:[
     {k:'hook',l:'Hook / concept',t:'text',req:1},{k:'category',l:'Angle',t:'select',opts:ANGLE_CATS},
     {k:'format',l:'Format',t:'select',opts:['1:1','4:5','9:16','story']},
     {k:'product',l:'Product',t:'select',opts:[...PRODNAMES,'brand']},
     {k:'status',l:'Status',t:'select',opts:['idea','in design','ready','live','retired']},
     {k:'brief',l:'Visual brief',t:'textarea'},{k:'assetUrl',l:'Asset link (Higgsfield/Drive)',t:'url'},
     {k:'perfNotes',l:'Performance notes',t:'textarea'}]},
 notes:{label:'Notes',icon:'📝',primary:'text',
   fields:[
     {k:'text',l:'Note',t:'textarea',req:1},
     {k:'tag',l:'Tag',t:'select',opts:['idea','content','observation','follow-up']},
     {k:'author',l:'Author',t:'select',opts:['Diana','Victor']}]},
 channels:{label:'Channel ROI',icon:'📈',primary:'channel',

/* ---------- store: supabase + localStorage cache ---------- */
const CACHE_KEY='feelOS_cache_v1', CFG_KEY='feelOS_supa_v1';
const Store={
 state:{}, client:null, local:true, cfg:null,
 init(){
   try{this.cfg=JSON.parse(localStorage.getItem(CFG_KEY)||'null')}catch(e){}
   const cached=this.loadCache();
   this.state=cached||seed();
   if(!cached)this.saveCache();
   if(this.cfg&&this.cfg.url&&this.cfg.key&&window.supabase){this.connect(this.cfg.url,this.cfg.key,true);}
 },
 loadCache(){try{return JSON.parse(localStorage.getItem(CACHE_KEY))}catch(e){return null}},
 saveCache(){try{localStorage.setItem(CACHE_KEY,JSON.stringify(this.state))}catch(e){}},
 list(c){return this.state[c]||(this.state[c]=[])},
 get(c,id){return this.list(c).find(x=>x.id===id)},
 async connect(url,key,silent){
   try{
     this.client=window.supabase.createClient(url,key);
     this.cfg={url,key};localStorage.setItem(CFG_KEY,JSON.stringify(this.cfg));
     this.local=false;
     await this.seedRemoteIfEmpty();
     await this.fetchAll();
     this.subscribe();
     setSync(true);
     if(!silent)toast('Connected to Supabase. Data is now shared live.');
   }catch(e){this.local=true;setSync(false);if(!silent)toast('Could not connect: '+e.message);console.error(e);}
 },
 disconnect(){this.client=null;this.local=true;this.cfg=null;localStorage.removeItem(CFG_KEY);setSync(false);},
 async fetchAll(){
   if(!this.client)return;
   const grouped={};
   for(const k in seed())grouped[k]=[];

   // Cargar cafeterías de la tabla específica
   const {data:cafeterias,error:cafError}=await this.client.from('cafeterias').select('*');
   if(!cafError&&cafeterias){
     grouped['cafeterias']=cafeterias.map(c=>({...c,id:c.id}));
   }

   // Cargar otros datos de feel_records
   const {data,error}=await this.client.from('feel_records').select('*');
   if(error){console.error(error);return;}
   data.forEach(r=>{(grouped[r.collection]=grouped[r.collection]||[]).push({id:r.id,...r.data,_created:r.created_at});});
   for(const k in COLS)if(!grouped[k])grouped[k]=[];
   ['inventory','adaptogens','pillars','sales'].forEach(k=>{if(!grouped[k])grouped[k]=[]});
   this.state=grouped;
   this.saveCache();render();
 },
 async seedRemoteIfEmpty(){
   const {data}=await this.client.from('feel_records').select('id').limit(1);
   if(data&&data.length)return; // remote already has data
   const rows=[]; // push whatever is currently local (seed + anything entered offline)
   for(const coll in this.state)(this.state[coll]||[]).forEach(rec=>{const {id,_created,_updated,...d}=rec;rows.push({collection:coll,data:d});});
   if(rows.length)await this.client.from('feel_records').insert(rows);
 },
 subscribe(){
   if(!this.client)return;
   this.client.channel('feelos').on('postgres_changes',{event:'*',schema:'public',table:'feel_records'},()=>{
     clearTimeout(this._t);this._t=setTimeout(()=>this.fetchAll(),350);
   }).subscribe();
 },
 async upsert(c,obj){
   const arr=this.list(c);const isNew=!obj.id;
   if(this.client){
     const {id,_created,_updated,...data}=obj;
     // Las cafeterías se guardan en tabla específica
     if(c==='cafeterias'){
       if(isNew){
         const {data:ins,error}=await this.client.from('cafeterias').insert(data).select().single();
         if(error){console.error(error);toast('Save failed: '+error.message);}
         else{obj.id=ins.id;}
       }else{
         const {error}=await this.client.from('cafeterias').update(data).eq('id',id);
         if(error)console.error(error);
       }
     }else{
       if(isNew){
         const {data:ins,error}=await this.client.from('feel_records').insert({collection:c,data}).select().single();
         if(error){console.error(error);toast('Save failed: '+error.message);}
         else{obj.id=ins.id;obj._created=ins.created_at;}
       }else{
         const {error}=await this.client.from('feel_records').update({data}).eq('id',id);
         if(error)console.error(error);
       }
     }
   }else if(isNew){obj.id=uid();obj._created=new Date().toISOString();}
   const i=arr.findIndex(x=>x.id===obj.id);if(i>=0)arr[i]=obj;else arr.push(obj);
   this.saveCache();
   return obj;
 },
 async remove(c,id){
   this.state[c]=this.list(c).filter(x=>x.id!==id);this.saveCache();
   if(this.client){
     const table=c==='cafeterias'?'cafeterias':'feel_records';
     const col=c==='cafeterias'?'id':'id';
     await this.client.from(table).delete().eq(col,id);
   }
 },
 exportJSON(){return JSON.stringify(this.state,null,2);},
 async importJSON(txt){const o=JSON.parse(txt);this.state=o;this.saveCache();
   if(this.client){await this._pushAll();await this.fetchAll();}else render();},
 async _pushAll(){if(!this.client)return;
   await this.client.from('feel_records').delete().neq('id','00000000-0000-0000-0000-000000000000');
   const rows=[];for(const c in this.state)(this.state[c]||[]).forEach(r=>{const{id,_created,_updated,...d}=r;rows.push({collection:c,data:d});});
   if(rows.length)await this.client.from('feel_records').insert(rows);}
};

/* ---------- helpers for velocity / alerts ---------- */
function velocity(sku){ // bags/day over last 30d
 const since=new Date(Date.now()-30*864e5);
 const u=Store.list('sales').filter(s=>s.sku===sku&&new Date(s.date)>=since).reduce((a,s)=>a+num(s.qty),0);
 return u/30;
}
function daysOfStock(inv){const v=velocity(inv.sku);return v>0?Math.floor(inv.bags/v):null;}
function alerts(){
 const a=[];
 Store.list('inventory').forEach(i=>{if(i.bags<=i.reorderAt)a.push({t:'low',msg:`${i.name} low: ${i.bags} bags left (reorder at ${i.reorderAt})`,r:'inventory'});});
 Store.list('b2b').forEach(b=>{const d=daysTo(b.nextAction);if(b.nextAction&&d!==null&&d<=0)a.push({t:'crm',msg:`Follow up due: ${b.name}`,r:'b2b'});});
 Store.list('ideas').forEach(i=>{if(i.status&&i.status!=='posted'&&i.status!=='idea'&&i.status==='scheduled')a.push({t:'content',msg:`Scheduled, not posted: ${i.title}`,r:'ideas'});});
 // adaptogen bottleneck reminder
 return a;
}

function renderCRM(c){
 const cfg=COLS[c];const items=Store.list(c);

 let h=`<div class="page-head"><div><h1>${cfg.icon} ${cfg.label}</h1><p>${c==='b2b'?'cafes, restaurants, studios, gyms, hotels and retailers - never lose a follow-up.':'track every gift, reply, shipment and post in one pipeline.'}</p></div>

 h+=`<div class="toolbar">
   <div class="filter"><span>⌕</span><input id="f_${c}" placeholder="Filter ${cfg.label}…" oninput="filterList('${c}',this.value)"></div>
   <div class="seg"><button class="${mode==='board'?'active':''}" data-action="vmode" data-coll="${c}" data-m="board">Board</button>
   <button class="${mode==='table'?'active':''}" data-action="vmode" data-coll="${c}" data-m="table">Table</button></div></div>`;
 if(!items.length)return h+empty(cfg,c);

function filterList(c,q){
 q=q.toLowerCase();const items=Store.list(c).filter(it=>Object.values(it).some(v=>String(v).toLowerCase().includes(q)));
 const mode=viewMode[c]||'board';
 $('#list_'+c).innerHTML=items.length?(mode==='board'?board(c,items):tableHTML(c,items)):'<div class="empty">No matches.</div>';
}
function tableHTML(c,items){
 const cfg=COLS[c];const cols=cfg.cols||cfg.fields.slice(0,4).map(f=>f.k);
 let h=`<div class="tablewrap"><table><thead><tr>`;
 cols.forEach(k=>h+=`<th>${label(c,k)}</th>`);h+=`</tr></thead><tbody>`;
 items.forEach(it=>{h+=`<tr data-action="openform" data-coll="${c}" data-id="${it.id}">`;
   cols.forEach(k=>{let v=it[k];
     if(k==='roas'){const r=num(it.spend)?(num(it.revenue)/num(it.spend)).toFixed(2)+'x':'—';v=r;}
     if(k==='status'||k==='type'||k==='impact')v=`<span class="chip ${chipColor(v||'')}">${esc(v||'—')}</span>`;
     else if(k==='url'||k==='postUrl')v=v?`<a href="${esc(v)}" target="_blank" onclick="event.stopPropagation()">open ↗</a>`:'—';
     else if(/spend|revenue|totalSpend/.test(k))v=v?money(v):'—';
     else if(k==='followers'||k==='reach')v=v?Number(v).toLocaleString():'—';
     else v=esc(v||'—');
     h+=`<td>${v}</td>`;});
   h+=`</tr>`;});
 h+=`</tbody></table></div>`;return h;
}
function board(c,items){
 const cfg=COLS[c];let h=`<div class="board">`;
 cfg.stages.forEach(st=>{const col=items.filter(i=>(i[cfg.board]||cfg.stages[0])===st);
   h+=`<div class="bcol"><h4>${st}<span>${col.length}</span></h4>`;
   col.forEach(it=>{h+=`<div class="bcard" data-action="openform" data-coll="${c}" data-id="${it.id}">
     <div class="t">${esc(it[cfg.primary]||'untitled')}</div><div class="m">`;
     (cfg.cols||[]).filter(k=>k!==cfg.primary&&k!==cfg.board).slice(0,3).forEach(k=>{if(it[k])h+=`<span class="chip n">${esc(it[k])}</span>`;});
     h+=`</div></div>`;});
   h+=`</div>`;});
 h+=`</div>`;return h;
}
function label(c,k){const f=(COLS[c].fields||[]).find(f=>f.k===k);return f?f.l:(k==='roas'?'ROAS':k);}
function empty(cfg,c){return `<div class="empty"><div class="big">${cfg.icon}</div><div style="font-weight:600;font-size:17px;color:var(--ink)">Nothing here yet</div>
  <p style="margin:6px 0 16px">Add your first ${cfg.label.toLowerCase()} entry to get going.</p>
  <button class="btn" data-action="openform" data-coll="${c}">＋ Add ${cfg.label}</button></div>`;}

   ${Object.entries(s.rows).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><span class="rowmuted">${Number(k).toLocaleString()} bags</span><b>${money(v)}</b></div>`).join('')}</div>`);
 h+=`</div>`;
 // margin calculator
 h+=`<div class="card"><h3>Margin calculator</h3>
   <div class="grid g3"><div class="field"><label>Sell price (€)</label><input id="mc_p" type="number" value="29.95" oninput="calcMargin()"></div>
   <div class="field"><label>Cost / bag (€)</label><input id="mc_c" type="number" value="18.84" oninput="calcMargin()"></div>
   <div class="field"><label>Units</label><input id="mc_u" type="number" value="225" oninput="calcMargin()"></div></div>
   <div id="mc_out" class="grid g3" style="margin-top:6px"></div></div>`;
 setTimeout(calcMargin,0);
 return h;
}
function calcMargin(){const p=num($('#mc_p').value),c=num($('#mc_c').value),u=num($('#mc_u').value);
 const per=p-c,marg=p?(per/p*100):0,net=per*u;
 $('#mc_out').innerHTML=stat('Margin / bag',money(per),marg.toFixed(1)+'% margin')+stat('Net profit',money(net),u+' units')+stat('Gross revenue',money(p*u),'');
}

function renderFounderOps(){
 const tabs=[['roi','Channel ROI'],['schedule','Production schedule'],['events','Events'],['competitors','Competitors'],['quickwins','Quick wins'],['assets','Assets'],['latam','LatAm'],['links','Links'],['higgs','Higgsfield']];
 let h=`<div class="page-head"><div><h1>🚀 Growth & Ops</h1><p>the founder layer: roi, reorder timing, events, competitor moves, quick wins and your tool links.</p></div></div>`;
 h+=`<div class="subtabs">`+tabs.map(t=>`<button class="${foTab===t[0]?'active':''}" data-action="fotab" data-t="${t[0]}">${t[1]}</button>`).join('')+`</div>`;
 h+=foContent(foTab);
 return h;
}
function foContent(t){
 if(t==='roi'){const ch=Store.list('channels');
   let h=`<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn ghost sm" data-action="openform" data-coll="channels">＋ Channel</button></div>`;
   h+=tableHTML('channels',ch);return h;}
 if(t==='schedule'){let h=`<div class="card"><h3>Reorder & next production</h3><div class="tablewrap"><table><thead><tr><th>SKU</th><th>Bags left</th><th>Velocity /day</th><th>Days left</th><th>Suggested action</th></tr></thead><tbody>`;
   Store.list('inventory').forEach(i=>{const v=velocity(i.sku);const d=daysOfStock(i);
     h+=`<tr style="cursor:default"><td><b>${esc(i.name)}</b></td><td style="text-align:right">${i.bags}</td><td style="text-align:right">${v.toFixed(2)}</td><td style="text-align:right">${d!=null?d:'—'}</td><td style="text-align:right">${i.bags<=i.reorderAt?'<b style="color:var(--bad)">reorder now</b>':d!=null&&d<30?'plan next batch':'ok'}</td></tr>`;});
   h+=`</tbody></table></div><div class="rulebox" style="margin-top:12px">Lead time with Kaffetoo (Gonzalo) plus adaptogen reorder of Ashwagandha + Cordyceps drives the next batch date. Keep ≥30 days of stock buffer.</div></div>`;return h;}
 if(t==='higgs'){const tpl=ANGLE_CATS.map(c=>`<div class="bcard" style="margin:0 0 8px"><b>${c}</b><div class="m" style="color:var(--muted)">"feel - ${c} angle, ${'{product}'}, cream #EDDDC6 base, product accent dominant, flat matte, no gradients, helvetica neue bold headline, lowercase, english copy, no exclamation."</div><button class="btn ghost sm" data-action="copytpl" data-c="${c}" style="margin-top:8px">Copy prompt</button></div>`).join('');
   return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">Higgsfield prompt templates</h3><a class="btn ghost sm" href="https://higgsfield.ai" target="_blank">Open Higgsfield ↗</a></div><p class="rowmuted" style="margin:8px 0 14px">one starter prompt per angle, on-brand by default. tweak {product} then paste into Higgsfield.</p>${tpl}</div>`;}
 // generic collections: events, competitors, quickwins, assets, latam, links
 const c=t;let h=`<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn ghost sm" data-action="openform" data-coll="${c}">＋ Add ${COLS[c].label}</button></div>`;
 const items=Store.list(c);
 if(COLS[c].board&&items.length)h+=board(c,items);
 else h+=items.length?tableHTML(c,items):empty(COLS[c],c);
 return h;
}

/* ============================================================ FORMS / MODALS ============================================================ */
function modalOpen(html){$('#modalRoot').innerHTML=`<div class="overlay" id="overlayBg">${html}</div>`;}
function modalClose(){$('#modalRoot').innerHTML='';}
function openForm(c,id){
 const cfg=COLS[c];const it=id?Store.get(c,id):{};
 let h=`<div class="modal"><h2>${id?'Edit':'New'} ${cfg.label}</h2><div class="sub">${id?'update the fields and save.':'fill what you have. nothing is mandatory except the first field.'}</div><form id="mf">`;
 cfg.fields.forEach(f=>{const opts=typeof f.opts==='function'?f.opts():f.opts;
   const v=it[f.k]!=null?it[f.k]:'';
   h+=`<div class="field"><label>${f.l}${f.req?' *':''}</label>`;
   if(f.t==='textarea')h+=`<textarea name="${f.k}">${esc(v)}</textarea>`;
   else if(f.t==='select')h+=`<select name="${f.k}"><option value=""></option>${opts.map(o=>`<option ${v===o?'selected':''}>${esc(o)}</option>`).join('')}</select>`;
   else h+=`<input name="${f.k}" type="${f.t}" value="${esc(v)}" ${f.req?'required':''}>`;
   h+=`</div>`;});
 h+=`<div class="modal-actions">`;
 if(id)h+=`<button type="button" class="btn ghost" data-action="del" data-coll="${c}" data-id="${id}">Delete</button>`;
 h+=`<button type="button" class="btn ghost" data-action="overlay">Cancel</button><button type="submit" class="btn">Save</button></div></form></div>`;
 modalOpen(h);
 $('#mf').addEventListener('submit',e=>{e.preventDefault();
   const fd=new FormData(e.target);const obj=id?{...it}:{};
   cfg.fields.forEach(f=>obj[f.k]=fd.get(f.k));
   Store.upsert(c,obj).then(()=>{modalClose();render();toast(`${cfg.label} saved.`);});
 });
}
function openSale(){
 const inv=Store.list('inventory');
 let h=`<div class="modal"><h2>Log a sale</h2><div class="sub">stock drops automatically when you save.</div><form id="mf">
   <div class="field"><label>Product *</label><select name="sku" required>${inv.map(i=>`<option value="${i.sku}">${esc(i.name)} (${i.bags} left)</option>`).join('')}</select></div>
   <div class="field half"><label>Quantity *</label><input name="qty" type="number" value="1" min="1" required></div>
   <div class="field half"><label>Unit price (€)</label><input name="unitPrice" type="number" value="29.95" step="0.01"></div>
   <div class="field"><label>Channel</label><select name="channel"><option>D2C</option><option>wholesale</option><option>event</option><option>other</option></select></div>
   <div class="field"><label>Date</label><input name="date" type="date" value="${todayISO()}"></div>
   <div class="modal-actions"><button type="button" class="btn ghost" data-action="overlay">Cancel</button><button type="submit" class="btn">Log sale</button></div></form></div>`;
 modalOpen(h);
 $('#mf').addEventListener('submit',async e=>{e.preventDefault();const fd=new FormData(e.target);
   const sku=fd.get('sku'),qty=num(fd.get('qty'));
   await Store.upsert('sales',{sku,qty,unitPrice:num(fd.get('unitPrice')),channel:fd.get('channel'),date:fd.get('date')});
   const i=Store.list('inventory').find(x=>x.sku===sku);if(i){i.bags=Math.max(0,num(i.bags)-qty);await Store.upsert('inventory',i);}
   modalClose();render();toast('Sale logged, stock updated.');});
}
function openEditInv(id){const i=Store.get('inventory',id);
 let h=`<div class="modal"><h2>Edit ${esc(i.name)}</h2><form id="mf">
   <div class="field half"><label>Bags in stock</label><input name="bags" type="number" value="${i.bags}"></div>
   <div class="field half"><label>Reorder at</label><input name="reorderAt" type="number" value="${i.reorderAt}"></div>
   <div class="modal-actions"><button type="button" class="btn ghost" data-action="overlay">Cancel</button><button type="submit" class="btn">Save</button></div></form></div>`;
 modalOpen(h);
 $('#mf').addEventListener('submit',e=>{e.preventDefault();const fd=new FormData(e.target);
   i.bags=num(fd.get('bags'));i.reorderAt=num(fd.get('reorderAt'));
   Store.upsert('inventory',i).then(()=>{modalClose();render();});});
}
function openData(){
 const connected=!!Store.client;
 let h=`<div class="modal"><h2>Data & sync</h2><div class="sub">${connected?'connected to supabase. data is shared live across devices.':'currently local only. connect supabase to share with diana.'}</div>
   <div class="field"><label>Supabase project URL</label><input id="su_url" type="url" placeholder="https://xxxx.supabase.co" value="${esc(Store.cfg?.url||'')}"></div>
   <div class="field"><label>Supabase anon public key</label><input id="su_key" type="text" placeholder="eyJhbGci..." value="${esc(Store.cfg?.key||'')}"></div>
   <div class="modal-actions"><button type="button" class="btn" data-action="saveSupa">${connected?'Reconnect':'Connect'}</button></div>
   <div style="margin-top:8px;display:flex;gap:8px"><button class="btn ghost sm" data-action="exp">Export backup</button><button class="btn ghost sm" data-action="imp">Import backup</button>${connected?'<button class="btn ghost sm" data-action="disc">Disconnect</button>':''}</div>
   <p class="rowmuted" style="font-size:12px;margin-top:12px">Run the supabase-schema.sql file once in your Supabase SQL editor before connecting. Backups are JSON of everything in the app.</p></div>`;
 modalOpen(h);
}

/* ---------- search ---------- */
function runSearch(q){
 q=q.trim().toLowerCase();if(!q){closeSearch();return;}
 const res=[];
 for(const c in COLS){Store.list(c).forEach(it=>{
   const hay=Object.values(it).join(' ').toLowerCase();
   if(hay.includes(q))res.push({c,it});});}
 // brand hub text
 let h=`<div class="searchres" id="searchRes">`;
 if(!res.length)h+=`<div class="sr-item"><span class="rowmuted">No matches for "${esc(q)}"</span></div>`;
 else res.slice(0,30).forEach(r=>h+=`<div class="sr-item" data-action="srgo" data-coll="${r.c}" data-id="${r.it.id}"><span class="ic">${COLS[r.c].icon}</span><span style="flex:1"><b>${esc(r.it[COLS[r.c].primary]||'item')}</b><div style="font-size:12px;color:var(--muted)">${COLS[r.c].label}</div></span></div>`);
 h+=`</div>`;
 const old=$('#searchRes');if(old)old.remove();
 $('#search').style.position='relative';$('#search').insertAdjacentHTML('beforeend',h);
}
function closeSearch(){const r=$('#searchRes');if(r)r.remove();}

/* ---------- toast ---------- */
function toast(msg){let t=$('#toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:12px 20px;border-radius:12px;font-weight:600;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.3);font-size:14px';document.body.appendChild(t);}
 t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2400);}

/* ---------- side toggle (mobile) ---------- */
function openSide(){$('#side').classList.add('open');if(!$('.scrim')){const s=document.createElement('div');s.className='scrim';s.onclick=closeSide;document.body.appendChild(s);}}
function closeSide(){$('#side').classList.remove('open');const s=$('.scrim');if(s)s.remove();}

/* ============================================================ EVENTS ============================================================ */
document.addEventListener('click',e=>{
 if(e.target.classList&&e.target.classList.contains('overlay')){modalClose();return;}
 const t=e.target.closest('[data-action]');
 if(!t){if(!e.target.closest('#search'))closeSearch();return;}
 const a=t.dataset.action,c=t.dataset.coll,id=t.dataset.id;
 switch(a){
   case 'openform':openForm(c,id);break;
   case 'logsale':openSale();break;
   case 'editinv':openEditInv(id);break;
   case 'recount':toast('Tap a product’s ✎ to set the real count.');location.hash='inventory';break;
   case 'del':if(confirm('Delete this entry?')){Store.remove(c,id).then(()=>{modalClose();render();});}break;
   case 'overlay':modalClose();break;
   case 'data-menu':openData();break;
   case 'saveSupa':{const u=$('#su_url').value.trim(),k=$('#su_key').value.trim();if(!u||!k){toast('Paste both URL and key.');break;}modalClose();Store.connect(u,k);break;}
   case 'disc':Store.disconnect();modalClose();render();toast('Disconnected. Back to local only.');break;
   case 'exp':{const blob=new Blob([Store.exportJSON()],{type:'application/json'});const a2=document.createElement('a');a2.href=URL.createObjectURL(blob);a2.download='feel-os-backup.json';a2.click();break;}
   case 'imp':{const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=ev=>{const f=ev.target.files[0];const r=new FileReader();r.onload=()=>{try{Store.importJSON(r.result);modalClose();toast('Backup imported.');}catch(x){toast('Bad file.');}};r.readAsText(f);};inp.click();break;}
   case 'btab':brandTab=t.dataset.t;render();break;
   case 'fotab':foTab=t.dataset.t;render();break;
   case 'eview':emailView=t.dataset.v;render();break;
   case 'nfilter':notesFilter=t.dataset.t;render();break;
   case 'vmode':viewMode[c]=t.dataset.m;render();break;
   case 'quicknote':location.hash='notes';setTimeout(()=>{$('#quickNoteBox')?.focus();},60);break;
   case 'savequicknote':{const txt=$('#quickNoteBox').value.trim();if(!txt){toast('Write something first.');break;}Store.upsert('notes',{text:txt,tag:$('#quickNoteTag').value,author:'Diana'}).then(()=>{render();toast('Note saved.');});break;}
   case 'addpillar':{const n=prompt('New content pillar:');if(n)Store.upsert('pillars',{name:n}).then(render);break;}
   case 'delpillar':Store.remove('pillars',id).then(render);break;
   case 'openangle':openForm('adangles');setTimeout(()=>{const s=document.querySelector('#mf [name=category]');if(s)s.value=t.dataset.cat;},40);break;
   case 'copytpl':{const txt=`feel - ${t.dataset.c} angle, {product}, cream #EDDDC6 base, product accent dominant, flat matte, no gradients, helvetica neue bold headline, lowercase english copy, no exclamation.`;navigator.clipboard?.writeText(txt);toast('Prompt copied.');break;}
   case 'srgo':closeSearch();$('#searchInput').value='';openForm(c,id);break;
   case 'importcsv':{const inp=document.createElement('input');inp.type='file';inp.accept='.csv,text/csv';inp.onchange=ev=>{const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=async()=>{const rows=parseCSV(r.result);if(!rows.length){toast('No valid rows (need an email column).');return;}let n=0;for(const row of rows){await Store.upsert('contacts',row);n++;}render();toast(n+' contacts imported.');};r.readAsText(f);};inp.click();break;}
 }
});
$('#burger').addEventListener('click',()=>{$('#side').classList.contains('open')?closeSide():openSide();});
$('#searchInput').addEventListener('input',e=>runSearch(e.target.value));

/* ---------- boot ---------- */
Store.init();
if(!location.hash)location.hash='home';
render();
</script>
</body>
</html>
